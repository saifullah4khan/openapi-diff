name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[yaml,dev]"
      - run: pytest -q
      - name: The example specs should report breaking changes
        run: |
          openapi-diff examples/petstore-v1.yaml examples/petstore-v2.yaml --all && exit 1
          test $? -eq 1
