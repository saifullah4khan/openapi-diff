# The same API after a careless release. Diff it against petstore-v1.yaml:
#   openapi-diff examples/petstore-v1.yaml examples/petstore-v2.yaml --all
openapi: 3.0.3
info:
  title: Pet Store
  version: 2.0.0
paths:
  /pets:
    get:
      operationId: listPets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: tenant
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A list of pets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Pet"
                  nextCursor:
                    type: string
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, species]
              properties:
                name:
                  type: string
                species:
                  type: string
                tag:
                  type: string
      responses:
        "201":
          description: Created.
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
